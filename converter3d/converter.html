<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>3D Конвертер BOF</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a18; overflow: hidden; font-family: 'Courier New', monospace; }
  canvas { display: block; }

  /* ── HUD overlay ───────────────────────────────────── */
  #hud { position: absolute; inset: 0; pointer-events: none; }

  #state-badge {
    position: absolute; top: 9px; left: 50%; transform: translateX(-50%);
    background: rgba(10,10,24,0.82);
    border: 1px solid rgba(0,200,240,0.55);
    color: #00c8f0;
    padding: 3px 16px; font-size: 10px; letter-spacing: .14em;
    border-radius: 3px; white-space: nowrap;
  }

  #metrics {
    position: absolute; bottom: 9px; left: 8px; right: 8px;
    display: flex; gap: 5px; justify-content: center;
  }
  .metric {
    background: rgba(10,10,24,0.78);
    border: 1px solid rgba(0,200,240,0.28);
    border-radius: 4px; padding: 3px 8px; text-align: center; flex: 1;
  }
  .metric-label { color: rgba(0,200,240,0.60); font-size: 7px; letter-spacing: .08em; text-transform: uppercase; }
  .metric-value { color: #cce8ff; font-size: 12px; font-weight: bold; min-height: 15px; }

  #no3d {
    position: absolute; inset: 0; display: flex; align-items: center;
    justify-content: center; color: #334455; font-size: 11px;
    text-align: center; padding: 20px; line-height: 1.6;
  }
</style>
</head>
<body>

<!-- HUD -->
<div id="hud">
  <div id="state-badge">ОЖИДАНИЕ</div>
  <div id="metrics">
    <div class="metric">
      <div class="metric-label">Металл, т</div>
      <div class="metric-value" id="m-metal">—</div>
    </div>
    <div class="metric">
      <div class="metric-label">Шлак, т</div>
      <div class="metric-value" id="m-slag">—</div>
    </div>
    <div class="metric">
      <div class="metric-label">T, °C</div>
      <div class="metric-value" id="m-temp">—</div>
    </div>
    <div class="metric">
      <div class="metric-label">O₂, м³</div>
      <div class="metric-value" id="m-blast">—</div>
    </div>
  </div>
</div>

<div id="no3d" style="display:none">
  3D-сцена недоступна<br>(нет подключения к CDN Three.js)
</div>

<script>
// ═══════════════════════════════════════════════════════════
// Global converter state — kept outside initScene so that
// updateConverter() can be called at any time (even before
// Three.js finishes loading) and the call will take effect
// once syncScene() is first invoked.
// ═══════════════════════════════════════════════════════════
var converterState = {
  state:       'idle',
  metalMass:   0,
  metalLevel:  0,
  slagMass:    0,
  slagLevel:   0,
  blastFlow:   0,
  temperature: 1400
};

var syncScene = null;   // set by initScene(); called by updateConverter()

function updateConverter(data) {
  if (typeof data === 'string') {
    try { data = JSON.parse(data); } catch(e) { return; }
  }
  Object.assign(converterState, data);
  syncHUD();
  if (typeof syncScene === 'function') syncScene();
}

// ── HUD sync ────────────────────────────────────────────────
function syncHUD() {
  var s = converterState;
  var labels = { idle: 'ОЖИДАНИЕ', charged: 'ЗАГРУЖЕНО',
                 blowing: 'ПРОДУВКА', complete: 'ГОТОВО' };
  var badge = document.getElementById('state-badge');
  badge.textContent = labels[s.state] || 'ОЖИДАНИЕ';

  if (s.state === 'complete') {
    badge.style.borderColor  = 'rgba(255,100,0,.70)';
    badge.style.color        = '#ff8844';
  } else if (s.state === 'blowing') {
    badge.style.borderColor  = 'rgba(255,200,0,.60)';
    badge.style.color        = '#ffcc44';
  } else {
    badge.style.borderColor  = 'rgba(0,200,240,.55)';
    badge.style.color        = '#00c8f0';
  }

  document.getElementById('m-metal').textContent =
    s.metalMass > 0 ? s.metalMass.toFixed(1) : '—';
  document.getElementById('m-slag').textContent =
    s.slagMass  > 0 ? s.slagMass.toFixed(1)  : '—';
  document.getElementById('m-temp').textContent =
    (s.state === 'complete' || s.state === 'blowing') && s.temperature > 0
      ? s.temperature.toFixed(0) : '—';
  document.getElementById('m-blast').textContent =
    s.blastFlow > 0 ? s.blastFlow.toFixed(0) : '—';
}

// ═══════════════════════════════════════════════════════════
// Script loader helpers
// ═══════════════════════════════════════════════════════════
function loadScript(src, ok, fail) {
  var s = document.createElement('script');
  s.src     = src;
  s.onload  = ok;
  s.onerror = fail || function() {};
  document.head.appendChild(s);
}

// Load Three.js from CDN, then optionally qwebchannel.js, then build the scene.
loadScript(
  'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js',
  function() {
    // Three.js is available — try to load QWebChannel transport
    loadScript(
      'qrc:///qtwebchannel/qwebchannel.js',
      function() { initScene(true);  },
      function() { initScene(false); }   // viewing in a browser — no channel
    );
  },
  function() {
    document.getElementById('no3d').style.display = 'flex';
  }
);

// ═══════════════════════════════════════════════════════════
// Three.js Scene
// ═══════════════════════════════════════════════════════════
function initScene(hasChannel) {

  // ── Renderer ──────────────────────────────────────────────
  var renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled  = true;
  renderer.shadowMap.type     = THREE.PCFSoftShadowMap;
  renderer.toneMapping        = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.05;
  document.body.appendChild(renderer.domElement);

  // ── Scene / Camera ────────────────────────────────────────
  var scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0a18);
  scene.fog = new THREE.Fog(0x0a0a18, 14, 24);

  var camera = new THREE.PerspectiveCamera(
    44, window.innerWidth / window.innerHeight, 0.1, 50
  );
  camera.position.set(4.8, 2.2, 4.8);
  camera.lookAt(0, 1.1, 0);

  // ── Lights ────────────────────────────────────────────────
  scene.add(new THREE.AmbientLight(0x182040, 2.2));

  var sun = new THREE.DirectionalLight(0xb0ccee, 1.6);
  sun.position.set(6, 11, 5);
  sun.castShadow = true;
  sun.shadow.camera.near    = 0.5;
  sun.shadow.camera.far     = 40;
  sun.shadow.camera.left    = -6;
  sun.shadow.camera.right   =  6;
  sun.shadow.camera.top     =  8;
  sun.shadow.camera.bottom  = -4;
  sun.shadow.mapSize.set(1024, 1024);
  scene.add(sun);

  var fill = new THREE.DirectionalLight(0x203060, 0.75);
  fill.position.set(-5, 4, -4);
  scene.add(fill);

  // Molten-metal glow inside the converter
  var glowLight = new THREE.PointLight(0xff5500, 0, 5);
  glowLight.position.set(0, 1.0, 0);
  scene.add(glowLight);

  // Lance interaction glow
  var lanceLight = new THREE.PointLight(0x88ddff, 0, 3);
  scene.add(lanceLight);

  // ── Platform ──────────────────────────────────────────────
  var platGeo = new THREE.CylinderGeometry(1.5, 1.5, 0.14, 36);
  var platMat = new THREE.MeshStandardMaterial({ color: 0x16141f, roughness: 0.92, metalness: 0.18 });
  var platform = new THREE.Mesh(platGeo, platMat);
  platform.position.y = -0.07;
  platform.receiveShadow = true;
  scene.add(platform);

  // ── BOF Vessel ────────────────────────────────────────────
  // LatheGeometry profile [radius, y].  Origin = bottom of vessel.
  var outerPts = [
    new THREE.Vector2(0.04, 0.00),   // bottom tip
    new THREE.Vector2(0.44, 0.13),   // lower curve
    new THREE.Vector2(0.72, 0.33),   // lower body
    new THREE.Vector2(0.81, 0.72),   // belly
    new THREE.Vector2(0.82, 1.50),   // upper body (widest)
    new THREE.Vector2(0.75, 1.80),   // upper taper
    new THREE.Vector2(0.52, 2.02),   // shoulder
    new THREE.Vector2(0.33, 2.22),   // neck
    new THREE.Vector2(0.30, 2.44),   // top rim
  ];
  var vesselGeo = new THREE.LatheGeometry(outerPts, 72);

  // Outer steel shell
  var shellMat = new THREE.MeshStandardMaterial({
    color: 0x2e2640, roughness: 0.52, metalness: 0.78,
    side: THREE.FrontSide,
  });
  var shell = new THREE.Mesh(vesselGeo, shellMat);
  shell.castShadow = true;
  scene.add(shell);

  // Inner refractory lining
  var liningMat = new THREE.MeshStandardMaterial({
    color: 0x3c2210, roughness: 0.93, metalness: 0.04,
    side: THREE.BackSide,
  });
  scene.add(new THREE.Mesh(vesselGeo, liningMat));

  // Top rim ring
  var rimPts = [
    new THREE.Vector2(0.285, 2.42),
    new THREE.Vector2(0.345, 2.44),
    new THREE.Vector2(0.345, 2.52),
    new THREE.Vector2(0.285, 2.52),
  ];
  var rimMat = new THREE.MeshStandardMaterial({ color: 0x505570, roughness: 0.38, metalness: 0.90 });
  scene.add(new THREE.Mesh(new THREE.LatheGeometry(rimPts, 72), rimMat));

  // ── Trunnion ring + axles + flanges ───────────────────────
  var trunnMat = new THREE.MeshStandardMaterial({ color: 0x5e6080, roughness: 0.36, metalness: 0.90 });

  var trunnRing = new THREE.Mesh(new THREE.TorusGeometry(0.89, 0.065, 10, 52), trunnMat);
  trunnRing.position.y  = 1.20;
  trunnRing.rotation.x  = Math.PI / 2;
  trunnRing.castShadow  = true;
  scene.add(trunnRing);

  var axleGeo   = new THREE.CylinderGeometry(0.058, 0.058, 0.56, 12);
  var flangeGeo = new THREE.CylinderGeometry(0.110, 0.110, 0.04, 16);
  [-1, 1].forEach(function(side) {
    var axle = new THREE.Mesh(axleGeo, trunnMat);
    axle.rotation.z = Math.PI / 2;
    axle.position.set(side * 1.09, 1.20, 0);
    scene.add(axle);
    var flange = new THREE.Mesh(flangeGeo, trunnMat);
    flange.rotation.z = Math.PI / 2;
    flange.position.set(side * 1.34, 1.20, 0);
    scene.add(flange);
  });

  // ── Metal fill body ───────────────────────────────────────
  // Unit-height cylinder: scale.y = metalH, position.y = 0.05 + metalH/2
  var metalBodyGeo = new THREE.CylinderGeometry(0.74, 0.42, 1.0, 48, 1, false);
  var metalMat = new THREE.MeshStandardMaterial({
    color: 0xdd3300, emissive: 0xbb1100, emissiveIntensity: 0.45,
    roughness: 0.30, metalness: 0.72,
  });
  var metalBody = new THREE.Mesh(metalBodyGeo, metalMat);
  metalBody.visible = false;
  scene.add(metalBody);

  // Metal surface disc (shimmery top)
  var metalSurfGeo = new THREE.CircleGeometry(0.74, 48);
  var metalSurfMat = new THREE.MeshStandardMaterial({
    color: 0xff5500, emissive: 0xee2200, emissiveIntensity: 0.65,
    roughness: 0.18, metalness: 0.82,
  });
  var metalSurf = new THREE.Mesh(metalSurfGeo, metalSurfMat);
  metalSurf.rotation.x = -Math.PI / 2;
  metalSurf.visible = false;
  scene.add(metalSurf);

  // ── Slag layer ────────────────────────────────────────────
  var slagBodyGeo = new THREE.CylinderGeometry(0.72, 0.72, 1.0, 48, 1, false);
  var slagMat = new THREE.MeshStandardMaterial({
    color: 0x7a6020, emissive: 0x3d2a00, emissiveIntensity: 0.12,
    roughness: 0.96, metalness: 0.04, transparent: true, opacity: 0.88,
  });
  var slagBody = new THREE.Mesh(slagBodyGeo, slagMat);
  slagBody.visible = false;
  scene.add(slagBody);

  // ── Oxygen Lance ──────────────────────────────────────────
  var lanceGroup = new THREE.Group();
  lanceGroup.position.set(0, 4.8, 0);
  scene.add(lanceGroup);

  var lanceMat = new THREE.MeshStandardMaterial({ color: 0x8ab8d4, metalness: 0.95, roughness: 0.10 });

  // Main tube
  var lanceTube = new THREE.Mesh(new THREE.CylinderGeometry(0.026, 0.024, 2.2, 14), lanceMat);
  lanceTube.position.y = -1.1;
  lanceGroup.add(lanceTube);

  // Nozzle
  var nozzle = new THREE.Mesh(new THREE.ConeGeometry(0.050, 0.14, 14), lanceMat);
  nozzle.position.y = -2.27;
  lanceGroup.add(nozzle);

  // Coolant manifold (top block)
  var manifold = new THREE.Mesh(new THREE.BoxGeometry(0.13, 0.16, 0.13), lanceMat);
  manifold.position.y = 0.08;
  lanceGroup.add(manifold);

  // Auxiliary cooling pipes  (×4 symmetric)
  var cpGeo = new THREE.CylinderGeometry(0.008, 0.008, 2.0, 6);
  [0, 1, 2, 3].forEach(function(i) {
    var ang = (i / 4) * Math.PI * 2 + Math.PI / 4;
    var cp  = new THREE.Mesh(cpGeo, lanceMat);
    cp.position.set(Math.cos(ang) * 0.042, -1.0, Math.sin(ang) * 0.042);
    lanceGroup.add(cp);
  });

  // ── Spark / blow particles ─────────────────────────────────
  var N_SPARK  = 150;
  var N_SMOKE  = 50;

  var spkPos  = new Float32Array(N_SPARK * 3);
  var spkVel  = [];
  var spkLife = new Float32Array(N_SPARK);
  for (var i = 0; i < N_SPARK; i++) {
    spkPos[i*3] = spkPos[i*3+1] = spkPos[i*3+2] = 999;
    spkVel.push(new THREE.Vector3());
    spkLife[i] = 0;
  }
  var spkGeo = new THREE.BufferGeometry();
  spkGeo.setAttribute('position', new THREE.BufferAttribute(spkPos, 3));
  var spkMat = new THREE.PointsMaterial({ color: 0xffcc22, size: 0.055,
    transparent: true, opacity: 0, sizeAttenuation: true });
  scene.add(new THREE.Points(spkGeo, spkMat));

  var smokePos  = new Float32Array(N_SMOKE * 3);
  var smokeVel  = [];
  var smokeLife = new Float32Array(N_SMOKE);
  for (var j = 0; j < N_SMOKE; j++) {
    smokePos[j*3] = smokePos[j*3+1] = smokePos[j*3+2] = 999;
    smokeVel.push(new THREE.Vector3());
    smokeLife[j] = 0;
  }
  var smokeGeo = new THREE.BufferGeometry();
  smokeGeo.setAttribute('position', new THREE.BufferAttribute(smokePos, 3));
  var smokeMat = new THREE.PointsMaterial({ color: 0x887766, size: 0.16,
    transparent: true, opacity: 0, sizeAttenuation: true });
  scene.add(new THREE.Points(smokeGeo, smokeMat));

  // ── Animation state ────────────────────────────────────────
  var clock         = new THREE.Clock();
  var time          = 0;
  var targetLanceY  = 4.8;
  var targetGlow    = 0;

  function tempToColor(t) {
    var f = Math.max(0, Math.min(1, (t - 1300) / 420));
    return new THREE.Color(0.78 + 0.22 * f, 0.08 + 0.52 * f, 0);
  }

  function respawnSpark(idx) {
    var ny = lanceGroup.position.y - 2.27;
    var ang = Math.random() * Math.PI * 2;
    var r   = Math.random() * 0.07;
    spkPos[idx*3]   = Math.cos(ang) * r;
    spkPos[idx*3+1] = ny;
    spkPos[idx*3+2] = Math.sin(ang) * r;
    var sp = 0.016 + Math.random() * 0.026;
    spkVel[idx].set(
      (Math.random() - 0.5) * 0.040,
      (Math.random() < 0.5 ? -1 : 1) * sp + 0.010,
      (Math.random() - 0.5) * 0.040
    );
    spkLife[idx] = 0.4 + Math.random() * 0.7;
  }

  function respawnSmoke(idx) {
    var ny = 2.55;
    smokePos[idx*3]   = (Math.random() - 0.5) * 0.35;
    smokePos[idx*3+1] = ny;
    smokePos[idx*3+2] = (Math.random() - 0.5) * 0.35;
    smokeVel[idx].set(
      (Math.random() - 0.5) * 0.005,
      0.010 + Math.random() * 0.009,
      (Math.random() - 0.5) * 0.005
    );
    smokeLife[idx] = 1.0;
  }

  // ── Scene-sync (called from updateConverter) ───────────────
  syncScene = function() {
    var s = converterState;
    var isBlowing  = (s.state === 'blowing');
    var isComplete = (s.state === 'complete');

    // --- Metal ---
    var MAX_METAL_H = 1.38;
    var mH = Math.max(0, s.metalLevel) * MAX_METAL_H;
    if (mH > 0.015) {
      metalBody.visible    = true;
      metalSurf.visible    = true;
      metalBody.scale.y    = mH;
      metalBody.position.y = 0.05 + mH * 0.5;
      metalSurf.position.y = 0.05 + mH;
    } else {
      metalBody.visible = false;
      metalSurf.visible = false;
    }

    // --- Slag ---
    var MAX_SLAG_H = 0.28;
    var slH = Math.max(0, s.slagLevel) * MAX_SLAG_H;
    if (slH > 0.008 && mH > 0.015) {
      slagBody.visible    = true;
      slagBody.scale.y    = slH;
      slagBody.position.y = (0.05 + mH) + slH * 0.5;
    } else {
      slagBody.visible = false;
    }

    // --- Temperature colour ---
    if (isBlowing || isComplete) {
      var col = tempToColor(s.temperature || 1500);
      metalMat.color    = col;
      metalMat.emissive = col.clone().multiplyScalar(0.50);
      metalSurfMat.color    = col.clone().multiplyScalar(1.25);
      metalSurfMat.emissive = col.clone().multiplyScalar(0.80);
    }

    // --- Lance target position ---
    if (isBlowing) {
      var metalTopY = mH > 0.015 ? (0.05 + mH) : 1.0;
      var slagTopY  = slH > 0.008 ? metalTopY + slH : metalTopY;
      targetLanceY = slagTopY + 0.50;
    } else {
      targetLanceY = 4.8;
    }

    // --- Glow intensity ---
    targetGlow = mH * (isBlowing ? 2.8 : 0.9);
  };

  // ── Main render loop ───────────────────────────────────────
  function animate() {
    requestAnimationFrame(animate);
    var dt = clock.getDelta();
    time += dt;

    // Camera slow orbit
    var R = 5.4;
    camera.position.x = Math.sin(time * 0.18) * R;
    camera.position.z = Math.cos(time * 0.18) * R;
    camera.position.y = 2.1 + Math.sin(time * 0.11) * 0.28;
    camera.lookAt(0, 1.1, 0);

    // Lance smooth motion
    lanceGroup.position.y += (targetLanceY - lanceGroup.position.y) * 0.04;

    // Glow smooth lerp
    glowLight.position.y = metalBody.visible
      ? metalBody.position.y + metalBody.scale.y * 0.5 : 1.0;
    glowLight.intensity += (targetGlow - glowLight.intensity) * 0.06;
    if (metalBody.visible) glowLight.color = metalMat.color;

    var isBlowing = (converterState.state === 'blowing');

    // Lance light
    lanceLight.position.copy(lanceGroup.position);
    lanceLight.position.y -= 2.27;
    lanceLight.intensity = isBlowing
      ? 1.3 + 0.45 * Math.sin(time * 9.0) : 0;

    // Sparks
    var showSpark = isBlowing && metalBody.visible;
    spkMat.opacity = showSpark ? 0.88 : 0;
    if (showSpark) {
      var pa = spkGeo.attributes.position.array;
      for (var i = 0; i < N_SPARK; i++) {
        spkLife[i] -= dt;
        if (spkLife[i] <= 0) {
          respawnSpark(i);
        } else {
          pa[i*3]   += spkVel[i].x;
          pa[i*3+1] += spkVel[i].y;
          pa[i*3+2] += spkVel[i].z;
          spkVel[i].y -= 0.0008;
        }
      }
      spkGeo.attributes.position.needsUpdate = true;
    }

    // Smoke
    var showSmoke = (converterState.state === 'blowing' || converterState.state === 'complete');
    smokeMat.opacity = showSmoke ? 0.28 : 0;
    if (showSmoke) {
      var sa = smokeGeo.attributes.position.array;
      for (var j = 0; j < N_SMOKE; j++) {
        smokeLife[j] -= dt * 0.45;
        if (smokeLife[j] <= 0 && Math.random() < 0.08) {
          respawnSmoke(j);
        } else if (smokeLife[j] > 0) {
          sa[j*3]   += smokeVel[j].x;
          sa[j*3+1] += smokeVel[j].y;
          sa[j*3+2] += smokeVel[j].z;
          smokeVel[j].x += (Math.random() - 0.5) * 0.0008;
          smokeVel[j].z += (Math.random() - 0.5) * 0.0008;
        } else {
          sa[j*3] = 999;
        }
      }
      smokeGeo.attributes.position.needsUpdate = true;
    }

    // Metal surface ripple when blowing
    if (isBlowing && metalSurf.visible) {
      metalSurf.position.y = (0.05 + metalBody.scale.y)
        + Math.sin(time * 13) * 0.003;
    }

    renderer.render(scene, camera);
  }

  animate();

  // ── Resize ─────────────────────────────────────────────────
  window.addEventListener('resize', function() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // ── QWebChannel connection ─────────────────────────────────
  if (hasChannel && typeof qt !== 'undefined' && qt.webChannelTransport) {
    new QWebChannel(qt.webChannelTransport, function(channel) {
      var bridge = channel.objects.bridge;
      bridge.stateChanged.connect(function(jsonStr) {
        updateConverter(jsonStr);
      });
      bridge.on_ready('ready');
    });
  }
}
</script>
</body>
</html>
