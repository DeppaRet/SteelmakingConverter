<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>3D Конвертер BOF</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #06060f; overflow: hidden; font-family: 'Courier New', monospace; }
  canvas { display: block; }

  /* ── HUD overlay ───────────────────────────────────── */
  #hud { position: absolute; inset: 0; pointer-events: none; }

  #state-badge {
    position: absolute; top: 9px; left: 50%; transform: translateX(-50%);
    background: rgba(8,8,20,0.85);
    border: 1px solid rgba(0,200,240,0.55);
    color: #00c8f0;
    padding: 3px 16px; font-size: 10px; letter-spacing: .14em;
    border-radius: 3px; white-space: nowrap;
  }

  #metrics {
    position: absolute; bottom: 9px; left: 8px; right: 8px;
    display: flex; gap: 5px; justify-content: center;
  }
  .metric {
    background: rgba(8,8,20,0.80);
    border: 1px solid rgba(0,200,240,0.28);
    border-radius: 4px; padding: 3px 8px; text-align: center; flex: 1;
  }
  .metric-label { color: rgba(0,200,240,0.60); font-size: 7px; letter-spacing: .08em; text-transform: uppercase; }
  .metric-value { color: #cce8ff; font-size: 12px; font-weight: bold; min-height: 15px; }

  #no3d {
    position: absolute; inset: 0; display: flex; align-items: center;
    justify-content: center; color: #334455; font-size: 11px;
    text-align: center; padding: 20px; line-height: 1.6;
  }
</style>
</head>
<body>

<!-- HUD -->
<div id="hud">
  <div id="state-badge">ОЖИДАНИЕ</div>
  <div id="metrics">
    <div class="metric">
      <div class="metric-label">Металл, т</div>
      <div class="metric-value" id="m-metal">—</div>
    </div>
    <div class="metric">
      <div class="metric-label">Шлак, т</div>
      <div class="metric-value" id="m-slag">—</div>
    </div>
    <div class="metric">
      <div class="metric-label">T, °C</div>
      <div class="metric-value" id="m-temp">—</div>
    </div>
    <div class="metric">
      <div class="metric-label">O₂, м³</div>
      <div class="metric-value" id="m-blast">—</div>
    </div>
  </div>
</div>

<div id="no3d" style="display:none">
  3D-сцена недоступна<br>(нет подключения к CDN Three.js)
</div>

<script>
// ═══════════════════════════════════════════════════════════
// Global converter state
// ═══════════════════════════════════════════════════════════
var converterState = {
  state:       'idle',
  metalMass:   0,
  metalLevel:  0,
  slagMass:    0,
  slagLevel:   0,
  blastFlow:   0,
  temperature: 1400
};

var syncScene = null;

function updateConverter(data) {
  if (typeof data === 'string') {
    try { data = JSON.parse(data); } catch(e) { return; }
  }
  Object.assign(converterState, data);
  syncHUD();
  if (typeof syncScene === 'function') syncScene();
}

// ── HUD sync ────────────────────────────────────────────────
function syncHUD() {
  var s = converterState;
  var labels = { idle: 'ОЖИДАНИЕ', charged: 'ЗАГРУЖЕНО',
                 blowing: 'ПРОДУВКА', complete: 'ГОТОВО' };
  var badge = document.getElementById('state-badge');
  badge.textContent = labels[s.state] || 'ОЖИДАНИЕ';

  if (s.state === 'complete') {
    badge.style.borderColor = 'rgba(255,100,0,.70)';
    badge.style.color       = '#ff8844';
  } else if (s.state === 'blowing') {
    badge.style.borderColor = 'rgba(255,200,0,.60)';
    badge.style.color       = '#ffcc44';
  } else {
    badge.style.borderColor = 'rgba(0,200,240,.55)';
    badge.style.color       = '#00c8f0';
  }

  document.getElementById('m-metal').textContent =
    s.metalMass > 0 ? s.metalMass.toFixed(1) : '—';
  document.getElementById('m-slag').textContent =
    s.slagMass  > 0 ? s.slagMass.toFixed(1)  : '—';
  document.getElementById('m-temp').textContent =
    (s.state === 'complete' || s.state === 'blowing') && s.temperature > 0
      ? s.temperature.toFixed(0) : '—';
  document.getElementById('m-blast').textContent =
    s.blastFlow > 0 ? s.blastFlow.toFixed(0) : '—';
}

// ═══════════════════════════════════════════════════════════
// Script loader helpers
// ═══════════════════════════════════════════════════════════
function loadScript(src, ok, fail) {
  var s = document.createElement('script');
  s.src     = src;
  s.onload  = ok;
  s.onerror = fail || function() {};
  document.head.appendChild(s);
}

loadScript(
  'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js',
  function() {
    loadScript(
      'qrc:///qtwebchannel/qwebchannel.js',
      function() { initScene(true);  },
      function() { initScene(false); }
    );
  },
  function() {
    document.getElementById('no3d').style.display = 'flex';
  }
);

// ═══════════════════════════════════════════════════════════
// Three.js Scene
// ═══════════════════════════════════════════════════════════
function initScene(hasChannel) {

  // ── Renderer ──────────────────────────────────────────────
  var renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled   = true;
  renderer.shadowMap.type      = THREE.PCFSoftShadowMap;
  renderer.toneMapping         = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.10;
  document.body.appendChild(renderer.domElement);

  // ── Scene / Camera ────────────────────────────────────────
  var scene = new THREE.Scene();
  scene.background = new THREE.Color(0x06060f);
  scene.fog = new THREE.Fog(0x06060f, 18, 32);

  var camera = new THREE.PerspectiveCamera(
    44, window.innerWidth / window.innerHeight, 0.1, 80
  );
  camera.position.set(5.2, 2.5, 5.2);
  camera.lookAt(0, 1.2, 0);

  // ── Lights ────────────────────────────────────────────────

  // Ambient base
  scene.add(new THREE.AmbientLight(0x14122a, 2.8));

  // Main overhead directional (cool white)
  var sun = new THREE.DirectionalLight(0xaac8ee, 1.55);
  sun.position.set(6, 12, 5);
  sun.castShadow = true;
  sun.shadow.camera.near   = 0.5;
  sun.shadow.camera.far    = 50;
  sun.shadow.camera.left   = -8;
  sun.shadow.camera.right  =  8;
  sun.shadow.camera.top    = 10;
  sun.shadow.camera.bottom = -5;
  sun.shadow.mapSize.set(1024, 1024);
  scene.add(sun);

  // Cool blue fill
  var fill = new THREE.DirectionalLight(0x2a3870, 0.80);
  fill.position.set(-5, 5, -5);
  scene.add(fill);

  // Warm sodium-vapor industrial hanging lamps (point lights)
  var lamp1 = new THREE.PointLight(0xd4850a, 1.8, 14, 1.2);
  lamp1.position.set(0, 7.5, 1.5);
  scene.add(lamp1);

  var lamp2 = new THREE.PointLight(0xcc7c08, 1.4, 12, 1.2);
  lamp2.position.set(-3.5, 6.8, 0.5);
  scene.add(lamp2);

  // Molten metal glow
  var glowLight = new THREE.PointLight(0xff5500, 0, 6, 1.5);
  glowLight.position.set(0, 1.0, 0);
  scene.add(glowLight);

  // Lance interaction glow (oxygen jet, blue-white)
  var lanceLight = new THREE.PointLight(0x88ddff, 0, 4, 2.0);
  scene.add(lanceLight);

  // ── Materials ────────────────────────────────────────────

  var concreteFloorMat = new THREE.MeshStandardMaterial({
    color: 0x161420, roughness: 0.94, metalness: 0.04,
  });
  var steelDarkMat = new THREE.MeshStandardMaterial({
    color: 0x2a2840, roughness: 0.70, metalness: 0.72,
  });
  var steelMedMat = new THREE.MeshStandardMaterial({
    color: 0x383658, roughness: 0.55, metalness: 0.82,
  });
  var steelLightMat = new THREE.MeshStandardMaterial({
    color: 0x4e4c6a, roughness: 0.42, metalness: 0.88,
  });
  var industrialYellowMat = new THREE.MeshStandardMaterial({
    color: 0xc8920a, roughness: 0.45, metalness: 0.75,
  });
  var shellMat = new THREE.MeshStandardMaterial({
    color: 0x342c4c, roughness: 0.50, metalness: 0.80,
  });
  var liningMat = new THREE.MeshStandardMaterial({
    color: 0x3c2210, roughness: 0.93, metalness: 0.04,
    side: THREE.BackSide,
  });
  var trunnMat = new THREE.MeshStandardMaterial({
    color: 0x505878, roughness: 0.36, metalness: 0.90,
  });
  var lanceMat = new THREE.MeshStandardMaterial({
    color: 0x7ab8d4, metalness: 0.95, roughness: 0.08,
  });
  var ladleMat = new THREE.MeshStandardMaterial({
    color: 0x2e2840, roughness: 0.70, metalness: 0.68,
  });
  var hoodMat = new THREE.MeshStandardMaterial({
    color: 0x242032, roughness: 0.62, metalness: 0.75,
  });
  var wallMat = new THREE.MeshStandardMaterial({
    color: 0x0e0d16, roughness: 0.97, metalness: 0.01,
    side: THREE.BackSide,
  });

  // ── Industrial Hall ───────────────────────────────────────

  // Concrete floor
  var floorGeo = new THREE.PlaneGeometry(24, 24);
  var floor = new THREE.Mesh(floorGeo, concreteFloorMat);
  floor.rotation.x = -Math.PI / 2;
  floor.position.y = -0.12;
  floor.receiveShadow = true;
  scene.add(floor);

  // Grid overlay (lines)
  var grid = new THREE.GridHelper(22, 22, 0x211f30, 0x19172a);
  grid.position.y = -0.112;
  scene.add(grid);

  // I-beam columns at four corners
  var colPositions = [[-4.8,-4.2],[-4.8,4.2],[4.8,-4.2],[4.8,4.2]];
  colPositions.forEach(function(pos) {
    var web = new THREE.Mesh(new THREE.BoxGeometry(0.20, 9.6, 0.26), steelDarkMat);
    web.position.set(pos[0], 4.8, pos[1]);
    web.castShadow = true;
    scene.add(web);
    var flange = new THREE.Mesh(new THREE.BoxGeometry(0.34, 9.6, 0.07), steelDarkMat);
    flange.position.set(pos[0], 4.8, pos[1]);
    scene.add(flange);
  });

  // Ceiling trusses
  [-4.2, 0, 4.2].forEach(function(z) {
    var truss = new THREE.Mesh(new THREE.BoxGeometry(10.6, 0.20, 0.20), steelDarkMat);
    truss.position.set(0, 9.55, z);
    scene.add(truss);
  });
  var longTruss = new THREE.Mesh(new THREE.BoxGeometry(0.20, 0.20, 10.0), steelDarkMat);
  longTruss.position.set(0, 9.55, 0);
  scene.add(longTruss);

  // Overhead crane bridge girder (yellow)
  var craneBeam = new THREE.Mesh(new THREE.BoxGeometry(0.36, 0.58, 10.5), industrialYellowMat);
  craneBeam.position.set(2.0, 8.80, 0);
  craneBeam.castShadow = true;
  scene.add(craneBeam);

  // Crane end trucks
  var endTruckGeo = new THREE.BoxGeometry(1.3, 0.24, 0.32);
  [-4.8, 4.8].forEach(function(z) {
    var truck = new THREE.Mesh(endTruckGeo, industrialYellowMat);
    truck.position.set(2.0, 9.05, z);
    scene.add(truck);
  });

  // Crane hook block
  var hookBlock = new THREE.Mesh(new THREE.BoxGeometry(0.24, 0.38, 0.24), steelMedMat);
  hookBlock.position.set(2.0, 6.8, 0);
  scene.add(hookBlock);
  var wire = new THREE.Mesh(new THREE.BoxGeometry(0.05, 2.0, 0.05), steelDarkMat);
  wire.position.set(2.0, 7.8, 0);
  scene.add(wire);

  // Lamp housings
  [[ 0.0, 7.1, 1.5], [-2.8, 7.1, 0.5]].forEach(function(lp) {
    var lampBody = new THREE.Mesh(new THREE.BoxGeometry(0.30, 0.24, 0.30), steelDarkMat);
    lampBody.position.set(lp[0], lp[1], lp[2]);
    scene.add(lampBody);
    // Lamp shade (inverted truncated cone)
    var shadePts = [
      new THREE.Vector2(0.18, 0.0),
      new THREE.Vector2(0.36, -0.16),
    ];
    var shade = new THREE.Mesh(new THREE.LatheGeometry(shadePts, 20), industrialYellowMat);
    shade.position.set(lp[0], lp[1] - 0.02, lp[2]);
    scene.add(shade);
  });

  // Back and side walls
  var wallBack = new THREE.Mesh(new THREE.PlaneGeometry(24, 12), wallMat);
  wallBack.position.set(0, 5.5, -10.5);
  scene.add(wallBack);
  var wallLeft = new THREE.Mesh(new THREE.PlaneGeometry(22, 12), wallMat);
  wallLeft.position.set(-10.5, 5.5, 0);
  wallLeft.rotation.y = Math.PI / 2;
  scene.add(wallLeft);

  // ── Converter Support Frame ────────────────────────────────

  // Base platform slab
  var baseSlab = new THREE.Mesh(new THREE.BoxGeometry(5.0, 0.28, 3.6), steelDarkMat);
  baseSlab.position.set(0, -0.13, 0);
  baseSlab.receiveShadow = true;
  scene.add(baseSlab);

  // Circular ring platform under vessel
  var ringProfile = [
    new THREE.Vector2(1.58, -0.09),
    new THREE.Vector2(1.62, -0.09),
    new THREE.Vector2(1.62,  0.11),
    new THREE.Vector2(1.58,  0.11),
  ];
  var ringPlat = new THREE.Mesh(new THREE.LatheGeometry(ringProfile, 52), steelDarkMat);
  scene.add(ringPlat);

  // Bearing support columns
  var bearingLegGeo = new THREE.CylinderGeometry(0.115, 0.125, 3.35, 18);
  var bearingHousingGeo = new THREE.CylinderGeometry(0.215, 0.215, 0.40, 20);
  var colCapGeo = new THREE.BoxGeometry(0.34, 0.10, 0.34);

  [-1.72, 1.72].forEach(function(cx) {
    var leg = new THREE.Mesh(bearingLegGeo, steelMedMat);
    leg.position.set(cx, 0.11 + 3.35/2, 0);
    leg.castShadow = true;
    scene.add(leg);

    var housing = new THREE.Mesh(bearingHousingGeo, steelLightMat);
    housing.position.set(cx, 1.20, 0);
    housing.rotation.z = Math.PI / 2;
    scene.add(housing);

    var cap = new THREE.Mesh(colCapGeo, steelDarkMat);
    cap.position.set(cx, 3.48, 0);
    scene.add(cap);
  });

  // Cross-beam at top of frame
  var crossBeam = new THREE.Mesh(new THREE.BoxGeometry(3.65, 0.16, 0.22), steelMedMat);
  crossBeam.position.set(0, 3.55, 0);
  scene.add(crossBeam);

  // Diagonal stiffeners
  var stiffGeo = new THREE.BoxGeometry(3.0, 0.08, 0.09);
  [-0.55, 0.55].forEach(function(z) {
    var st = new THREE.Mesh(stiffGeo, steelDarkMat);
    st.position.set(0, 2.20, z);
    scene.add(st);
  });

  // ── BOF Vessel ────────────────────────────────────────────

  var outerPts = [
    new THREE.Vector2(0.04, 0.00),
    new THREE.Vector2(0.44, 0.13),
    new THREE.Vector2(0.72, 0.33),
    new THREE.Vector2(0.81, 0.72),
    new THREE.Vector2(0.82, 1.50),
    new THREE.Vector2(0.75, 1.80),
    new THREE.Vector2(0.52, 2.02),
    new THREE.Vector2(0.33, 2.22),
    new THREE.Vector2(0.30, 2.44),
  ];
  var vesselGeo = new THREE.LatheGeometry(outerPts, 72);

  var shell = new THREE.Mesh(vesselGeo, shellMat);
  shell.castShadow = true;
  scene.add(shell);

  scene.add(new THREE.Mesh(vesselGeo, liningMat));

  // Vessel reinforcement rings (3 stiffener tori)
  [[0.86, 0.55], [0.86, 1.10], [0.82, 1.68]].forEach(function(rr) {
    var ring = new THREE.Mesh(new THREE.TorusGeometry(rr[0], 0.028, 8, 44), trunnMat);
    ring.position.y = rr[1];
    ring.rotation.x = Math.PI / 2;
    scene.add(ring);
  });

  // Bottom rim band
  var bottomBand = new THREE.Mesh(new THREE.TorusGeometry(0.60, 0.030, 7, 36), trunnMat);
  bottomBand.position.y = 0.10;
  bottomBand.rotation.x = Math.PI / 2;
  scene.add(bottomBand);

  // Top rim ring
  var rimPts = [
    new THREE.Vector2(0.285, 2.42),
    new THREE.Vector2(0.345, 2.44),
    new THREE.Vector2(0.345, 2.54),
    new THREE.Vector2(0.285, 2.54),
  ];
  var rimMat = new THREE.MeshStandardMaterial({
    color: 0x505878, roughness: 0.36, metalness: 0.90,
  });
  scene.add(new THREE.Mesh(new THREE.LatheGeometry(rimPts, 60), rimMat));

  // ── Trunnion ring + axles + flanges ───────────────────────
  var trunnRing = new THREE.Mesh(new THREE.TorusGeometry(0.91, 0.068, 12, 52), trunnMat);
  trunnRing.position.y = 1.20;
  trunnRing.rotation.x = Math.PI / 2;
  trunnRing.castShadow = true;
  scene.add(trunnRing);

  var axleGeo   = new THREE.CylinderGeometry(0.060, 0.060, 0.62, 14);
  var flangeGeo = new THREE.CylinderGeometry(0.115, 0.115, 0.05, 18);
  [-1, 1].forEach(function(side) {
    var axle = new THREE.Mesh(axleGeo, trunnMat);
    axle.rotation.z = Math.PI / 2;
    axle.position.set(side * 1.11, 1.20, 0);
    scene.add(axle);
    var flange = new THREE.Mesh(flangeGeo, trunnMat);
    flange.rotation.z = Math.PI / 2;
    flange.position.set(side * 1.38, 1.20, 0);
    scene.add(flange);
  });

  // ── Metal fill body ───────────────────────────────────────
  var metalBodyGeo = new THREE.CylinderGeometry(0.74, 0.42, 1.0, 48, 1, false);
  var metalMat = new THREE.MeshStandardMaterial({
    color: 0xdd3300, emissive: 0xbb1100, emissiveIntensity: 0.50,
    roughness: 0.28, metalness: 0.72,
  });
  var metalBody = new THREE.Mesh(metalBodyGeo, metalMat);
  metalBody.visible = false;
  scene.add(metalBody);

  var metalSurfGeo = new THREE.CircleGeometry(0.74, 48);
  var metalSurfMat = new THREE.MeshStandardMaterial({
    color: 0xff5500, emissive: 0xee2200, emissiveIntensity: 0.70,
    roughness: 0.16, metalness: 0.82,
  });
  var metalSurf = new THREE.Mesh(metalSurfGeo, metalSurfMat);
  metalSurf.rotation.x = -Math.PI / 2;
  metalSurf.visible = false;
  scene.add(metalSurf);

  // ── Slag layer ────────────────────────────────────────────
  var slagBodyGeo = new THREE.CylinderGeometry(0.72, 0.72, 1.0, 48, 1, false);
  var slagMat = new THREE.MeshStandardMaterial({
    color: 0x7a6020, emissive: 0x3d2a00, emissiveIntensity: 0.14,
    roughness: 0.96, metalness: 0.04, transparent: true, opacity: 0.90,
  });
  var slagBody = new THREE.Mesh(slagBodyGeo, slagMat);
  slagBody.visible = false;
  scene.add(slagBody);

  // ── Steel Ladle on Ladle Car ──────────────────────────────
  // Ladle car
  var carBody = new THREE.Mesh(new THREE.BoxGeometry(1.50, 0.30, 1.10), ladleMat);
  carBody.position.set(-2.4, 0.02, 0.5);
  carBody.castShadow = true;
  scene.add(carBody);

  // Car wheels (4)
  var wheelGeo = new THREE.BoxGeometry(0.20, 0.22, 0.15);
  [[-0.48, -0.40], [0.48, -0.40], [-0.48, 0.40], [0.48, 0.40]].forEach(function(w) {
    var wh = new THREE.Mesh(wheelGeo, steelDarkMat);
    wh.position.set(-2.4 + w[0], -0.04, 0.5 + w[1]);
    scene.add(wh);
  });

  // Rail sections
  var railGeo = new THREE.BoxGeometry(0.07, 0.10, 2.2);
  [-0.55, 0.55].forEach(function(rx) {
    var rail = new THREE.Mesh(railGeo, steelLightMat);
    rail.position.set(-2.4 + rx, -0.09, 0.5);
    scene.add(rail);
  });

  // Ladle trunnion bars
  var trunnBarGeo = new THREE.BoxGeometry(1.7, 0.07, 0.07);
  [-0.44, 0.44].forEach(function(tz) {
    var tb = new THREE.Mesh(trunnBarGeo, steelMedMat);
    tb.position.set(-2.4, 1.15, 0.5 + tz);
    scene.add(tb);
  });

  // Ladle vessel
  var ladleOuterPts = [
    new THREE.Vector2(0.44, 0.00),
    new THREE.Vector2(0.50, 0.07),
    new THREE.Vector2(0.58, 0.55),
    new THREE.Vector2(0.60, 0.76),
    new THREE.Vector2(0.62, 0.84),
  ];
  var ladleVessel = new THREE.Mesh(new THREE.LatheGeometry(ladleOuterPts, 40), ladleMat);
  ladleVessel.position.set(-2.4, 0.30, 0.5);
  ladleVessel.castShadow = true;
  scene.add(ladleVessel);

  // Ladle rim torus
  var ladleRim = new THREE.Mesh(new THREE.TorusGeometry(0.61, 0.032, 8, 36), steelMedMat);
  ladleRim.position.set(-2.4, 0.30 + 0.84, 0.5);
  ladleRim.rotation.x = Math.PI / 2;
  scene.add(ladleRim);

  // Ladle reinforcement rings
  [[0.58, 0.22], [0.60, 0.50], [0.62, 0.72]].forEach(function(rr) {
    var lr = new THREE.Mesh(new THREE.TorusGeometry(rr[0], 0.022, 6, 30), ladleMat);
    lr.position.set(-2.4, 0.30 + rr[1], 0.5);
    lr.rotation.x = Math.PI / 2;
    scene.add(lr);
  });

  // Ladle inner lining (BackSide)
  var ladleInnerPts = [
    new THREE.Vector2(0.37, 0.02),
    new THREE.Vector2(0.43, 0.08),
    new THREE.Vector2(0.50, 0.56),
    new THREE.Vector2(0.52, 0.80),
  ];
  var ladleInner = new THREE.Mesh(
    new THREE.LatheGeometry(ladleInnerPts, 36),
    new THREE.MeshStandardMaterial({ color: 0x221308, roughness: 0.95, metalness: 0.02, side: THREE.BackSide })
  );
  ladleInner.position.set(-2.4, 0.30, 0.5);
  scene.add(ladleInner);

  // ── Fume Extraction Hood ──────────────────────────────────
  var hoodPts = [
    new THREE.Vector2(0.52, 2.52),
    new THREE.Vector2(0.38, 2.72),
    new THREE.Vector2(0.22, 3.10),
    new THREE.Vector2(0.22, 6.50),
  ];
  var hoodMesh = new THREE.Mesh(new THREE.LatheGeometry(hoodPts, 32), hoodMat);
  scene.add(hoodMesh);

  // Duct cap at ceiling
  var ductCap = new THREE.Mesh(new THREE.CircleGeometry(0.22, 24), hoodMat);
  ductCap.position.y = 6.50;
  ductCap.rotation.x = -Math.PI / 2;
  scene.add(ductCap);

  // Reinforcement rings on duct
  [3.3, 3.9, 4.5, 5.1, 5.7].forEach(function(ry) {
    var dr = new THREE.Mesh(new THREE.TorusGeometry(0.245, 0.028, 7, 24), hoodMat);
    dr.position.y = ry;
    dr.rotation.x = Math.PI / 2;
    scene.add(dr);
  });

  // Flange ring at duct base
  var ductFlange = new THREE.Mesh(new THREE.TorusGeometry(0.28, 0.040, 8, 28), steelMedMat);
  ductFlange.position.y = 3.10;
  ductFlange.rotation.x = Math.PI / 2;
  scene.add(ductFlange);

  // Hood group — hidden during tapping
  var hoodGroup = [hoodMesh, ductCap];

  // ── Oxygen Lance ──────────────────────────────────────────
  var lanceGroup = new THREE.Group();
  lanceGroup.position.set(0, 4.8, 0);
  scene.add(lanceGroup);

  // Main pipe
  var lanceTube = new THREE.Mesh(
    new THREE.CylinderGeometry(0.026, 0.024, 2.3, 14), lanceMat
  );
  lanceTube.position.y = -1.15;
  lanceGroup.add(lanceTube);

  // Coolant manifold block at top
  var manifold = new THREE.Mesh(new THREE.BoxGeometry(0.14, 0.20, 0.14), lanceMat);
  manifold.position.y = 0.10;
  lanceGroup.add(manifold);

  // Nozzle (cone)
  var nozzle = new THREE.Mesh(new THREE.ConeGeometry(0.054, 0.16, 14), new THREE.MeshStandardMaterial({
    color: 0xb09050, metalness: 0.88, roughness: 0.20,
  }));
  nozzle.position.y = -2.30;
  lanceGroup.add(nozzle);

  // 3 outer cooling pipes
  for (var pi = 0; pi < 3; pi++) {
    var pa = (pi / 3) * Math.PI * 2;
    var cp = new THREE.Mesh(
      new THREE.CylinderGeometry(0.010, 0.010, 2.25, 7), lanceMat
    );
    cp.position.set(Math.cos(pa) * 0.042, -1.125, Math.sin(pa) * 0.042);
    lanceGroup.add(cp);
  }

  // Lance guide clamp at vessel neck
  var guideRing = new THREE.Mesh(
    new THREE.TorusGeometry(0.048, 0.018, 6, 20), lanceMat
  );
  guideRing.position.y = 0;  // will be repositioned
  scene.add(guideRing);  // drawn separately so it stays at vessel neck

  // ── Spark / smoke / blow particles ────────────────────────
  var N_SPARK = 180;
  var N_SMOKE = 60;

  var spkPos  = new Float32Array(N_SPARK * 3);
  var spkVel  = [];
  var spkLife = new Float32Array(N_SPARK);
  for (var i = 0; i < N_SPARK; i++) {
    spkPos[i*3] = spkPos[i*3+1] = spkPos[i*3+2] = 999;
    spkVel.push(new THREE.Vector3());
    spkLife[i] = 0;
  }
  var spkGeo = new THREE.BufferGeometry();
  spkGeo.setAttribute('position', new THREE.BufferAttribute(spkPos, 3));
  var spkMat = new THREE.PointsMaterial({
    color: 0xffcc22, size: 0.060, transparent: true, opacity: 0, sizeAttenuation: true,
  });
  scene.add(new THREE.Points(spkGeo, spkMat));

  var smokePos  = new Float32Array(N_SMOKE * 3);
  var smokeVel  = [];
  var smokeLife = new Float32Array(N_SMOKE);
  for (var j = 0; j < N_SMOKE; j++) {
    smokePos[j*3] = smokePos[j*3+1] = smokePos[j*3+2] = 999;
    smokeVel.push(new THREE.Vector3());
    smokeLife[j] = 0;
  }
  var smokeGeo = new THREE.BufferGeometry();
  smokeGeo.setAttribute('position', new THREE.BufferAttribute(smokePos, 3));
  var smokeMat = new THREE.PointsMaterial({
    color: 0x887766, size: 0.20, transparent: true, opacity: 0, sizeAttenuation: true,
  });
  scene.add(new THREE.Points(smokeGeo, smokeMat));

  // ── Animation state ────────────────────────────────────────
  var clock        = new THREE.Clock();
  var time         = 0;
  var targetLanceY = 4.8;
  var targetGlow   = 0;

  function tempToColor(t) {
    var f = Math.max(0, Math.min(1, (t - 1300) / 420));
    return new THREE.Color(0.78 + 0.22 * f, 0.08 + 0.52 * f, 0);
  }

  function respawnSpark(idx) {
    var ny = lanceGroup.position.y - 2.30;
    var ang = Math.random() * Math.PI * 2;
    var r   = Math.random() * 0.075;
    spkPos[idx*3]   = Math.cos(ang) * r;
    spkPos[idx*3+1] = ny;
    spkPos[idx*3+2] = Math.sin(ang) * r;
    var sp = 0.014 + Math.random() * 0.030;
    spkVel[idx].set(
      (Math.random() - 0.5) * 0.044,
      (Math.random() < 0.45 ? -1 : 1) * sp + 0.010,
      (Math.random() - 0.5) * 0.044
    );
    spkLife[idx] = 0.35 + Math.random() * 0.75;
  }

  function respawnSmoke(idx) {
    smokePos[idx*3]   = (Math.random() - 0.5) * 0.38;
    smokePos[idx*3+1] = 2.58;
    smokePos[idx*3+2] = (Math.random() - 0.5) * 0.38;
    smokeVel[idx].set(
      (Math.random() - 0.5) * 0.005,
      0.009 + Math.random() * 0.010,
      (Math.random() - 0.5) * 0.005
    );
    smokeLife[idx] = 1.0;
  }

  // ── Scene-sync ─────────────────────────────────────────────
  syncScene = function() {
    var s = converterState;
    var isBlowing  = (s.state === 'blowing');
    var isComplete = (s.state === 'complete');

    // Metal
    var MAX_METAL_H = 1.38;
    var mH = Math.max(0, s.metalLevel) * MAX_METAL_H;
    if (mH > 0.015) {
      metalBody.visible    = true;
      metalSurf.visible    = true;
      metalBody.scale.y    = mH;
      metalBody.position.y = 0.05 + mH * 0.5;
      metalSurf.position.y = 0.05 + mH;
    } else {
      metalBody.visible = false;
      metalSurf.visible = false;
    }

    // Slag
    var MAX_SLAG_H = 0.28;
    var slH = Math.max(0, s.slagLevel) * MAX_SLAG_H;
    if (slH > 0.008 && mH > 0.015) {
      slagBody.visible    = true;
      slagBody.scale.y    = slH;
      slagBody.position.y = (0.05 + mH) + slH * 0.5;
    } else {
      slagBody.visible = false;
    }

    // Temperature colour
    if (isBlowing || isComplete) {
      var col = tempToColor(s.temperature || 1500);
      metalMat.color    = col;
      metalMat.emissive = col.clone().multiplyScalar(0.55);
      metalSurfMat.color    = col.clone().multiplyScalar(1.30);
      metalSurfMat.emissive = col.clone().multiplyScalar(0.85);
    }

    // Lance target
    if (isBlowing) {
      var metalTopY = mH > 0.015 ? (0.05 + mH) : 1.0;
      var slagTopY  = slH > 0.008 ? metalTopY + slH : metalTopY;
      targetLanceY = slagTopY + 0.50;
    } else {
      targetLanceY = 4.8;
    }

    // Glow
    targetGlow = mH * (isBlowing ? 3.0 : 0.9);

    // Fume hood / lance visibility
    var showHood = !isComplete;
    hoodGroup.forEach(function(m) { m.visible = showHood; });
  };

  // ── Main render loop ────────────────────────────────────────
  function animate() {
    requestAnimationFrame(animate);
    var dt = clock.getDelta();
    time += dt;

    // Camera slow orbit
    var R = 5.8;
    camera.position.x = Math.sin(time * 0.16) * R;
    camera.position.z = Math.cos(time * 0.16) * R;
    camera.position.y = 2.3 + Math.sin(time * 0.10) * 0.30;
    camera.lookAt(0, 1.2, 0);

    // Lance smooth motion
    lanceGroup.position.y += (targetLanceY - lanceGroup.position.y) * 0.04;

    // Lance guide ring follows the lance down into the vessel neck
    guideRing.position.y = Math.min(2.80, lanceGroup.position.y - 2.12);

    // Glow lerp
    glowLight.position.y = metalBody.visible
      ? metalBody.position.y + metalBody.scale.y * 0.5 : 1.0;
    glowLight.intensity += (targetGlow - glowLight.intensity) * 0.06;
    if (metalBody.visible) glowLight.color = metalMat.color;

    var isBlowing = (converterState.state === 'blowing');

    // Lance light
    lanceLight.position.copy(lanceGroup.position);
    lanceLight.position.y -= 2.30;
    lanceLight.intensity = isBlowing
      ? 1.5 + 0.50 * Math.sin(time * 9.5) : 0;

    // Sparks
    var showSpark = isBlowing && metalBody.visible;
    spkMat.opacity = showSpark ? 0.90 : 0;
    if (showSpark) {
      var pa = spkGeo.attributes.position.array;
      for (var i = 0; i < N_SPARK; i++) {
        spkLife[i] -= dt;
        if (spkLife[i] <= 0) {
          respawnSpark(i);
        } else {
          pa[i*3]   += spkVel[i].x;
          pa[i*3+1] += spkVel[i].y;
          pa[i*3+2] += spkVel[i].z;
          spkVel[i].y -= 0.0008;
        }
      }
      spkGeo.attributes.position.needsUpdate = true;
    }

    // Smoke
    var showSmoke = (converterState.state === 'blowing' || converterState.state === 'complete');
    smokeMat.opacity = showSmoke ? 0.30 : 0;
    if (showSmoke) {
      var sa = smokeGeo.attributes.position.array;
      for (var j = 0; j < N_SMOKE; j++) {
        smokeLife[j] -= dt * 0.40;
        if (smokeLife[j] <= 0 && Math.random() < 0.10) {
          respawnSmoke(j);
        } else if (smokeLife[j] > 0) {
          sa[j*3]   += smokeVel[j].x;
          sa[j*3+1] += smokeVel[j].y;
          sa[j*3+2] += smokeVel[j].z;
          smokeVel[j].x += (Math.random() - 0.5) * 0.0008;
          smokeVel[j].z += (Math.random() - 0.5) * 0.0008;
        } else {
          sa[j*3] = 999;
        }
      }
      smokeGeo.attributes.position.needsUpdate = true;
    }

    // Metal surface ripple during blow
    if (isBlowing && metalSurf.visible) {
      metalSurf.position.y = (0.05 + metalBody.scale.y)
        + Math.sin(time * 14) * 0.004;
    }

    renderer.render(scene, camera);
  }

  animate();

  // ── Resize ─────────────────────────────────────────────────
  window.addEventListener('resize', function() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // ── QWebChannel connection ─────────────────────────────────
  if (hasChannel && typeof qt !== 'undefined' && qt.webChannelTransport) {
    new QWebChannel(qt.webChannelTransport, function(channel) {
      var bridge = channel.objects.bridge;
      bridge.stateChanged.connect(function(jsonStr) {
        updateConverter(jsonStr);
      });
      bridge.on_ready('ready');
    });
  }
}
</script>
</body>
</html>
