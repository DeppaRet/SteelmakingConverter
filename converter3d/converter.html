<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>3D Конвертер BOF</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #06060f; overflow: hidden;
    font-family: 'Courier New', monospace;
  }
  body { position: relative; }
  #viewport {
    position: absolute;
    left: 0; top: 0; right: 0; bottom: 0;
    overflow: hidden;
    background: #06060f;
  }
  #viewport canvas {
    display: block;
    position: absolute;
    left: 0; top: 0;
  }

  /* HUD — only inside #viewport, no transform centering (Qt WebEngine bug) */
  #hud {
    position: absolute; left: 0; top: 0; right: 0; bottom: 0;
    pointer-events: none; z-index: 2;
    overflow: hidden;
  }

  #state-badge {
    position: absolute; top: 6px; left: 6px; right: 6px;
    background: rgba(8,8,20,0.92);
    border: 2px solid rgba(0,200,240,0.55);
    color: #00c8f0;
    padding: 6px 8px; font-size: 14px; font-weight: bold;
    border-radius: 4px; text-align: center;
    letter-spacing: 0.04em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  #scene-toggle {
    position: absolute; top: 38px; left: 6px;
    pointer-events: auto;
    background: rgba(8,8,20,0.92);
    border: 1px solid rgba(168,200,232,0.45);
    color: #a8c8e8;
    padding: 5px 10px; font-size: 12px;
    border-radius: 4px; cursor: pointer;
    max-width: calc(100% - 12px);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  #scene-toggle:hover { border-color: rgba(200,220,255,0.7); }

  #metrics {
    position: absolute; left: 6px; right: 6px; bottom: 8px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    max-height: 74px;
  }
  .metric {
    background: rgba(8,8,20,0.92);
    border: 1px solid rgba(0,200,240,0.35);
    border-radius: 4px; padding: 6px 8px 7px; text-align: center;
    min-width: 0;
  }
  .metric-label {
    color: rgba(0,200,240,0.80); font-size: 10px;
    line-height: 1.25;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .metric-value {
    color: #e8f4ff; font-size: 15px; font-weight: bold;
    line-height: 1.25; min-height: 18px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  #no3d {
    position: absolute; inset: 0; display: flex; align-items: center;
    justify-content: center; color: #334455; font-size: 11px;
    text-align: center; padding: 20px; line-height: 1.6; z-index: 3;
  }
</style>
</head>
<body>

<div id="viewport">
  <div id="hud">
  <div id="state-badge">ОЖИДАНИЕ</div>
  <button type="button" id="scene-toggle">Вид: Цех</button>
  <div id="metrics">
    <div class="metric">
      <div class="metric-label">Металл, т</div>
      <div class="metric-value" id="m-metal">—</div>
    </div>
    <div class="metric">
      <div class="metric-label">Шлак, т</div>
      <div class="metric-value" id="m-slag">—</div>
    </div>
    <div class="metric">
      <div class="metric-label">T, &#176;C</div>
      <div class="metric-value" id="m-temp">—</div>
    </div>
    <div class="metric">
      <div class="metric-label">O2, м³/мин</div>
      <div class="metric-value" id="m-blast">—</div>
    </div>
  </div>
  </div>
  <div id="no3d" style="display:none">
    3D-сцена недоступна<br>(нет подключения к CDN Three.js)
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// Global converter state
// ═══════════════════════════════════════════════════════════
var converterState = {
  state:       'idle',
  metalMass:   0,
  metalLevel:  0,
  slagMass:    0,
  slagLevel:   0,
  blastFlow:   0,
  temperature: 1400,
  lanceHeight: 0,
  penetrationDepth: 0,
  reactionZoneActive: false,
  foamDelta:   0,
  phi:         0,
  phiAlarm:    false
};
var currentUiLanguage = 'ru';
var UI_LABELS = {
  ru: {
    states: { idle: 'ОЖИДАНИЕ', charged: 'ЗАГРУЖЕНО', blowing: 'ПРОДУВКА', complete: 'ГОТОВО' },
    sceneHall: 'Вид: Цех',
    sceneProduct: 'Вид: Продукт',
    metal: 'Металл, т',
    slag: 'Шлак, т',
    temp: 'T, °C',
    o2: 'O2, м³/мин',
    no3d: '3D-сцена недоступна<br>(нет подключения к CDN Three.js)'
  },
  en: {
    states: { idle: 'IDLE', charged: 'CHARGED', blowing: 'BLOWING', complete: 'COMPLETE' },
    sceneHall: 'View: Shop',
    sceneProduct: 'View: Product',
    metal: 'Metal, t',
    slag: 'Slag, t',
    temp: 'T, °C',
    o2: 'O2, m³/min',
    no3d: '3D scene unavailable<br>(no CDN connection to Three.js)'
  }
};

function applyMetricLabels() {
  var L = UI_LABELS[currentUiLanguage] || UI_LABELS.ru;
  document.querySelectorAll('.metric-label').forEach(function(el, i) {
    var keys = ['metal', 'slag', 'temp', 'o2'];
    if (keys[i]) el.textContent = L[keys[i]];
  });
  var no3d = document.getElementById('no3d');
  if (no3d) no3d.innerHTML = L.no3d;
}

window.applyUiLanguage = function(lang) {
  currentUiLanguage = (lang === 'en') ? 'en' : 'ru';
  applyMetricLabels();
  if (typeof syncHUD === 'function') syncHUD();
  if (typeof setSceneMode === 'function') setSceneMode(sceneMode);
};
var H_FREE_BOARD_JS = 7.0;
var FOAM_SLH_SCALE  = 0.018;
var targetFoamSlH   = 0;
var currentFoamSlH  = 0;
var neckAlarmPhase  = 0;

var syncScene = null;
var setSceneMode = null;

// sync with converter3d/visual_style.py
var SCENE_HALL = 'hall';
var SCENE_PRODUCT = 'product';
var sceneMode = SCENE_HALL;
var TRUNNION_Y_JS = 1.20;
var REV_SEG = 72;
// 90° cutaway — sync converter3d/visual_style.py
var CUT_PHI_START = Math.PI * 0.75;
var CUT_PHI_LEN   = Math.PI * 1.5;
// Ladle in front of converter (+Z, toward default camera)
var LADLE_X = 0.0, LADLE_Y = 1.02, LADLE_Z = 2.15;
// Taphole on -Z; tilt around X (side trunnions) pours toward +Z
var TAPHOLE_OUTLET_Y = 1.02;
var TAPHOLE_OUTLET_Z = -1.05;
var LINING_ZONES_JS = [
  { yMin: 0.02, yMax: 0.35, color: 0x242a42 },
  { yMin: 0.35, yMax: 0.95, color: 0x9e2414 },
  { yMin: 0.95, yMax: 1.80, color: 0xc86a1e },
  { yMin: 1.80, yMax: 2.50, color: 0xe0c030 }
];
var INNER_PROFILE_JS = [
  [0.02, 0.02], [0.40, 0.15], [0.67, 0.36], [0.75, 0.73],
  [0.76, 1.49], [0.69, 1.81], [0.46, 2.02], [0.28, 2.22], [0.25, 2.44]
];
var METAL_FLOOR_Y = 0.24;
var MAX_METAL_H   = 1.38;
var MAX_SLAG_H    = 0.28;
var BATH_LEVEL_BOOST = 1.38;
var BATH_LEVEL_VISUAL = 1.28;
var layoutBathFill = null;

function visualMetalLevel(level) {
  if (level <= 0) return 0;
  return Math.min(1.0, level * BATH_LEVEL_VISUAL + 0.06);
}

function bathHeightFromLevel(level, pourFactor) {
  return visualMetalLevel(level) * MAX_METAL_H * BATH_LEVEL_BOOST * (1 - pourFactor);
}

function bathProfilePts(yMin, yMax, inset) {
  var band = profileYBand(INNER_PROFILE_JS, yMin, yMax);
  if (band.length < 2) return null;
  return band.map(function(p) {
    return new THREE.Vector2(p[0] * inset, p[1]);
  });
}

function bathProfilePtsClosed(yMin, yMax, inset) {
  var pts = bathProfilePts(yMin, yMax, inset);
  if (!pts) return null;
  if (pts[0].x > 0.025) {
    pts.unshift(new THREE.Vector2(0.006, yMin));
  }
  return pts;
}

function setVesselLathe(mesh, pts) {
  if (mesh.geometry) mesh.geometry.dispose();
  mesh.geometry = new THREE.LatheGeometry(pts, 36, CUT_PHI_START, CUT_PHI_LEN);
}

/** Full 360° bath — no cutaway gap (shell keeps partial arc for interior view). */
function setBathLathe(mesh, pts) {
  if (mesh.geometry) mesh.geometry.dispose();
  mesh.geometry = new THREE.LatheGeometry(pts, 52);
}

function makeMeltSurfaceTexture() {
  var c = document.createElement('canvas');
  c.width = c.height = 256;
  var ctx = c.getContext('2d');
  var g = ctx.createRadialGradient(128, 128, 8, 128, 128, 140);
  g.addColorStop(0, '#ffcc66');
  g.addColorStop(0.45, '#ff7722');
  g.addColorStop(0.85, '#ee4400');
  g.addColorStop(1, '#bb2800');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, 256, 256);
  for (var n = 0; n < 1200; n++) {
    var x = Math.random() * 256;
    var y = Math.random() * 256;
    var br = 180 + (Math.random() * 75 | 0);
    ctx.fillStyle = 'rgba(' + br + ',' + (br * 0.55 | 0) + ',32,' + (0.04 + Math.random() * 0.14) + ')';
    ctx.fillRect(x, y, 1 + (Math.random() * 2 | 0), 1);
  }
  var tex = new THREE.CanvasTexture(c);
  tex.wrapS = THREE.ClampToEdgeWrapping;
  tex.wrapT = THREE.ClampToEdgeWrapping;
  return tex;
}

function makeBrickTexture() {
  var c = document.createElement('canvas');
  c.width = c.height = 256;
  var ctx = c.getContext('2d');
  var bh = 32, bw = 64, m = 5;
  for (var y = 0; y < 256; y++) {
    for (var x = 0; x < 256; x++) {
      var row = Math.floor(y / bh);
      var lx = x % bw, ly = y % bh;
      if (lx < m || ly < m || lx >= bw - m || ly >= bh - m) {
        ctx.fillStyle = 'rgb(72,68,62)';
      } else {
        var n = ((x * 13 + y * 7 + row * 31) % 17) - 8;
        ctx.fillStyle = 'rgb(' + (168+n) + ',' + (118+(n/2|0)) + ',' + (72+(n/3|0)) + ')';
      }
      ctx.fillRect(x, y, 1, 1);
    }
  }
  var tex = new THREE.CanvasTexture(c);
  tex.wrapS = THREE.RepeatWrapping;
  tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(1, 1);
  return tex;
}

function profileYBand(profile, yMin, yMax) {
  function interp(r0, y0, r1, y1, y) {
    if (Math.abs(y1 - y0) < 1e-9) return [r0, y];
    var t = (y - y0) / (y1 - y0);
    return [r0 + t * (r1 - r0), y];
  }
  var pts = [];
  for (var i = 0; i < profile.length - 1; i++) {
    var r0 = profile[i][0], y0 = profile[i][1];
    var r1 = profile[i+1][0], y1 = profile[i+1][1];
    var lo = Math.min(y0, y1), hi = Math.max(y0, y1);
    if (hi < yMin || lo > yMax) continue;
    var segLo = Math.max(yMin, lo), segHi = Math.min(yMax, hi);
    var pLo = interp(r0, y0, r1, y1, segLo);
    var pHi = interp(r0, y0, r1, y1, segHi);
    if (!pts.length || Math.abs(pts[pts.length-1][1] - pLo[1]) > 1e-5)
      pts.push(pLo);
    if (Math.abs(pHi[1] - pLo[1]) > 1e-5 || Math.abs(pHi[0] - pLo[0]) > 1e-5)
      pts.push(pHi);
  }
  return pts;
}

function innerPtsFromBand(band) {
  return band.map(function(p) { return new THREE.Vector2(p[0], p[1]); });
}

function latheCut(profilePts, segments, material) {
  return new THREE.Mesh(
    new THREE.LatheGeometry(profilePts, segments, CUT_PHI_START, CUT_PHI_LEN),
    material
  );
}

function foamSlagExtraMeters(dhFoam) {
  var dh = Math.max(0, dhFoam || 0);
  return Math.min(MAX_SLAG_H * 0.85, dh * FOAM_SLH_SCALE);
}

function applyFoamTargets(s) {
  targetFoamSlH = foamSlagExtraMeters(s.foamDelta);
}

function updateConverter(data) {
  if (typeof data === 'string') {
    try { data = JSON.parse(data); } catch(e) { return; }
  }
  Object.assign(converterState, data);
  applyFoamTargets(converterState);
  if (data.uiTheme && typeof applyUiTheme === 'function') {
    applyUiTheme(data.uiTheme);
  }
  if (data.uiLanguage && typeof applyUiLanguage === 'function') {
    applyUiLanguage(data.uiLanguage);
  }
  syncHUD();
  if (typeof syncScene === 'function') syncScene();
}

// ── HUD sync ────────────────────────────────────────────────
function syncHUD() {
  var s = converterState;
  var L = UI_LABELS[currentUiLanguage] || UI_LABELS.ru;
  var labels = L.states;
  var badge = document.getElementById('state-badge');
  badge.textContent = labels[s.state] || labels.idle;

  if (s.state === 'complete') {
    badge.style.borderColor = 'rgba(255,100,0,.70)';
    badge.style.color       = '#ff8844';
  } else if (s.state === 'blowing') {
    badge.style.borderColor = 'rgba(255,200,0,.60)';
    badge.style.color       = '#ffcc44';
  } else {
    badge.style.borderColor = 'rgba(0,200,240,.55)';
    badge.style.color       = '#00c8f0';
  }

  document.getElementById('m-metal').textContent =
    s.metalMass > 0 ? s.metalMass.toFixed(1) : '—';
  document.getElementById('m-slag').textContent =
    s.slagMass  > 0 ? s.slagMass.toFixed(1)  : '—';
  document.getElementById('m-temp').textContent =
    (s.state === 'complete' || s.state === 'blowing') && s.temperature > 0
      ? s.temperature.toFixed(0) : '—';
  document.getElementById('m-blast').textContent =
    s.blastFlow > 0 ? s.blastFlow.toFixed(0) : '—';
}

// ═══════════════════════════════════════════════════════════
// Script loader helpers
// ═══════════════════════════════════════════════════════════
function loadScript(src, ok, fail) {
  var s = document.createElement('script');
  s.src     = src;
  s.onload  = ok;
  s.onerror = fail || function() {};
  document.head.appendChild(s);
}

loadScript(
  'three.min.js',
  function() { initScene(); },
  function() {
    loadScript(
      'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js',
      function() { initScene(); },
      function() {
        document.getElementById('no3d').style.display = 'flex';
      }
    );
  }
);

// ═══════════════════════════════════════════════════════════
// Three.js Scene
// ═══════════════════════════════════════════════════════════
function initScene() {

  var viewport = document.getElementById('viewport');

  // ── Renderer ──────────────────────────────────────────────
  var hudEl = document.getElementById('hud');
  var renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.localClippingEnabled = true;
  if ('useLegacyLights' in renderer) renderer.useLegacyLights = true;
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFShadowMap;
  renderer.toneMapping         = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.42;
  viewport.insertBefore(renderer.domElement, hudEl);

  var resizeTimer = null;

  // ── Scene / Camera (match opengl_widget: FOV 44°, lookAt Y=1.4) ──
  var scene = new THREE.Scene();
  var hallBg = 0x0d0a17;
  scene.background = new THREE.Color(hallBg);
  scene.fog = new THREE.Fog(hallBg, 26, 50);

  var camera = new THREE.PerspectiveCamera(44, 1, 0.1, 80);

  function resizeViewport() {
    var rect = viewport.getBoundingClientRect();
    var w = Math.max(2, Math.round(rect.width));
    var h = Math.max(2, Math.round(rect.height));
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setPixelRatio(1);
    renderer.setSize(w, h, true);
  }
  function scheduleResize() {
    if (resizeTimer) clearTimeout(resizeTimer);
    resizeTimer = setTimeout(resizeViewport, 40);
  }
  function bootstrapResize() {
    resizeViewport();
    requestAnimationFrame(resizeViewport);
    setTimeout(resizeViewport, 80);
    setTimeout(resizeViewport, 350);
  }
  window.resizeViewport = resizeViewport;
  window.bootstrapResize = bootstrapResize;
  if (typeof ResizeObserver !== 'undefined') {
    new ResizeObserver(scheduleResize).observe(viewport);
  }
  window.addEventListener('resize', scheduleResize);
  bootstrapResize();

  // ── Lights (aligned with opengl_widget._apply_hall_lights) ──
  var hemi = new THREE.HemisphereLight(0xc4d0ec, 0x221810, 0.78);
  scene.add(hemi);

  var ambientLight = new THREE.AmbientLight(0x9098b0, 0.42);
  scene.add(ambientLight);

  var sun = new THREE.DirectionalLight(0xffffff, 2.35);
  sun.position.set(5, 12, 5);
  sun.castShadow = true;
  sun.shadow.mapSize.set(512, 512);
  sun.shadow.camera.near = 0.5;
  sun.shadow.camera.far = 50;
  sun.shadow.camera.left = -8;
  sun.shadow.camera.right = 8;
  sun.shadow.camera.top = 10;
  sun.shadow.camera.bottom = -5;
  scene.add(sun);

  var fill = new THREE.DirectionalLight(0x506890, 1.05);
  fill.position.set(-5, 5, -5);
  scene.add(fill);

  var keyFront = new THREE.DirectionalLight(0xd8dce8, 0.72);
  keyFront.position.set(4, 8, 6);
  scene.add(keyFront);

  var lamp1 = new THREE.PointLight(0xffa030, 4.2, 22, 1.4);
  lamp1.position.set(0, 7.5, 1.5);
  scene.add(lamp1);

  var lamp2 = new THREE.PointLight(0xff9020, 3.2, 18, 1.4);
  lamp2.position.set(-3.5, 6.5, 0.5);2
  scene.add(lamp2);

  // Molten metal glow
  var glowLight = new THREE.PointLight(0xff5500, 0, 6, 1.5);
  glowLight.position.set(0, 1.0, 0);
  scene.add(glowLight);

  // Lance interaction glow (oxygen jet, blue-white)
  var lanceLight = new THREE.PointLight(0x88ddff, 0, 4, 2.0);
  scene.add(lanceLight);

  // ── Materials ────────────────────────────────────────────

  var concreteFloorMat = new THREE.MeshStandardMaterial({
    color: 0x22202c, roughness: 0.92, metalness: 0.05,
  });
  var steelDarkMat = new THREE.MeshStandardMaterial({
    color: 0x3a3850, roughness: 0.62, metalness: 0.78,
  });
  var steelMedMat = new THREE.MeshStandardMaterial({
    color: 0x48466a, roughness: 0.48, metalness: 0.84,
  });
  var steelLightMat = new THREE.MeshStandardMaterial({
    color: 0x626078, roughness: 0.38, metalness: 0.88,
  });
  var industrialYellowMat = new THREE.MeshStandardMaterial({
    color: 0xc8920a, roughness: 0.45, metalness: 0.75,
  });
  var brickTex = makeBrickTexture();

  function brickMatForZone(hexColor, band) {
    var y0 = band[0][1], y1 = band[band.length - 1][1];
    var h = Math.max(0.08, y1 - y0);
    var avgR = 0;
    for (var i = 0; i < band.length; i++) avgR += band[i][0];
    avgR /= band.length;
    var arcLen = avgR * CUT_PHI_LEN; /* visible arc length for brick scale */
    var tex = brickTex.clone();
    tex.wrapS = THREE.RepeatWrapping;
    tex.wrapT = THREE.RepeatWrapping;
    tex.repeat.set(Math.max(1.5, arcLen * 2.4), Math.max(0.45, h * 1.75));
    tex.offset.set(0, y0 * 1.75);
    var mat = new THREE.MeshStandardMaterial({
      color: hexColor, map: tex, roughness: 0.88, metalness: 0.08,
      side: THREE.BackSide,
    });
    return mat;
  }

  var shellMat = new THREE.MeshStandardMaterial({
    color: 0x4a4e58, roughness: 0.38, metalness: 0.82,
  });
  var safetyMat = new THREE.MeshStandardMaterial({
    color: 0x9eacb8, roughness: 0.92, metalness: 0.05,
    side: THREE.BackSide,
  });
  var trunnMat = new THREE.MeshStandardMaterial({
    color: 0x505878, roughness: 0.36, metalness: 0.90,
  });
  var lanceMat = new THREE.MeshStandardMaterial({
    color: 0x7ab8d4, metalness: 0.95, roughness: 0.08,
  });
  var ladleMat = new THREE.MeshStandardMaterial({
    color: 0x2e2840, roughness: 0.70, metalness: 0.68,
  });
  var hoodMat = new THREE.MeshStandardMaterial({
    color: 0x242032, roughness: 0.62, metalness: 0.75,
  });
  var wallMat = new THREE.MeshStandardMaterial({
    color: 0x0e0d16, roughness: 0.97, metalness: 0.01,
    side: THREE.BackSide,
  });

  var hallGroup = new THREE.Group();
  var frameGroup = new THREE.Group();
  var ladleGroup = new THREE.Group();
  scene.add(hallGroup);
  scene.add(frameGroup);
  scene.add(ladleGroup);

  var productBg = 0x000000;

  // sync visual_style — UI_THEMES
  var UI_THEMES = {
    dark: {
      hallBg: 0x0d0a17, productBg: 0x000000,
      hemiSky: 0xc4d0ec, hemiGround: 0x221810, hemiIntensity: 0.78,
      ambient: 0x9098b0, ambientIntensity: 0.42,
      sunIntensity: 2.35, fillColor: 0x506890, fillIntensity: 1.05,
      keyColor: 0xd8dce8, keyIntensity: 0.72,
      lamp1Color: 0xffa030, lamp1Intensity: 4.2,
      lamp2Color: 0xff9020, lamp2Intensity: 3.2,
      concrete: 0x22202c, steelDark: 0x3a3850, steelMed: 0x48466a,
      steelLight: 0x626078, shell: 0x4a4e58, wall: 0x0e0d16,
      hudBg: 'rgba(8,8,20,0.92)', hudBorder: 'rgba(0,200,240,0.55)',
      hudText: '#00c8f0', pageBg: '#06060f'
    },
    light: {
      hallBg: 0xe8ecf4, productBg: 0xd8dde8,
      hemiSky: 0xf0f4fc, hemiGround: 0xc8b8a8, hemiIntensity: 1.05,
      ambient: 0xb8c0d0, ambientIntensity: 0.55,
      sunIntensity: 2.0, fillColor: 0xa0b0c8, fillIntensity: 0.85,
      keyColor: 0xffffff, keyIntensity: 0.65,
      lamp1Color: 0xffd080, lamp1Intensity: 2.2,
      lamp2Color: 0xffc060, lamp2Intensity: 1.6,

  var spkPos  = new Float32Array(N_SPARK * 3);
  var spkVel  = [];
  var spkLife = new Float32Array(N_SPARK);
  for (var i = 0; i < N_SPARK; i++) {
    spkPos[i*3] = spkPos[i*3+1] = spkPos[i*3+2] = 999;
    spkVel.push(new THREE.Vector3());
    spkLife[i] = 0;
  }
  var spkGeo = new THREE.BufferGeometry();
  spkGeo.setAttribute('position', new THREE.BufferAttribute(spkPos, 3));
  var spkMat = new THREE.PointsMaterial({
    color: 0xffdd44, size: 0.14, transparent: true, opacity: 0,
    sizeAttenuation: true, blending: THREE.AdditiveBlending, depthWrite: false,
  });
  scene.add(new THREE.Points(spkGeo, spkMat));

  var smokePos  = new Float32Array(N_SMOKE * 3);
  var smokeVel  = [];
  var smokeLife = new Float32Array(N_SMOKE);
  for (var j = 0; j < N_SMOKE; j++) {
    smokePos[j*3] = smokePos[j*3+1] = smokePos[j*3+2] = 999;
    smokeVel.push(new THREE.Vector3());
    smokeLife[j] = 0;
  }
  var smokeGeo = new THREE.BufferGeometry();
  smokeGeo.setAttribute('position', new THREE.BufferAttribute(smokePos, 3));
  var smokeMat = new THREE.PointsMaterial({
    color: 0x99aabb, size: 0.32, transparent: true, opacity: 0,
    sizeAttenuation: true, depthWrite: false,
  });
  scene.add(new THREE.Points(smokeGeo, smokeMat));

  // ── Molten pour particles (taphole → ladle) ───────────────
  var N_POUR = 90;
  var pourPos  = new Float32Array(N_POUR * 3);
  var pourVel  = [];
  var pourLife = new Float32Array(N_POUR);
  for (var pi = 0; pi < N_POUR; pi++) {
    pourPos[pi*3] = pourPos[pi*3+1] = pourPos[pi*3+2] = 999;
    pourVel.push(new THREE.Vector3());
    pourLife[pi] = 0;
  }
  var pourGeo = new THREE.BufferGeometry();
  pourGeo.setAttribute('position', new THREE.BufferAttribute(pourPos, 3));
  var pourMat = new THREE.PointsMaterial({
    color: 0xffaa22, size: 0.22, transparent: true, opacity: 0,
    sizeAttenuation: true, blending: THREE.AdditiveBlending,
    depthWrite: false,
  });
  scene.add(new THREE.Points(pourGeo, pourMat));

  var pourTmp = new THREE.Vector3();
  var pourEnd = new THREE.Vector3(LADLE_X, LADLE_Y, LADLE_Z);

  function respawnPour(idx) {
    pourOutlet.getWorldPosition(pourTmp);
    pourPos[idx*3]   = pourTmp.x + (Math.random() - 0.5) * 0.05;
    pourPos[idx*3+1] = pourTmp.y + (Math.random() - 0.5) * 0.03;
    pourPos[idx*3+2] = pourTmp.z + (Math.random() - 0.5) * 0.05;
    var dx = LADLE_X - pourTmp.x;
    var dy = LADLE_Y - pourTmp.y;
    var dz = LADLE_Z - pourTmp.z;
    var dist = Math.sqrt(dx*dx + dy*dy + dz*dz) || 1;
    var sp = 2.2 + Math.random() * 1.4;
    pourVel[idx].set(dx / dist * sp, dy / dist * sp * 0.35 - 1.2, dz / dist * sp);
    pourLife[idx] = 0.55 + Math.random() * 0.45;
  }

  // ── Camera orbit (LMB drag + wheel) ───────────────────────
  var camAz = -0.52, camEl = 0.38, camDist = 7.5;  // ~-30° / +22°, HALL_DEFAULT_DIST
  var camDrag = false, camLX = 0, camLY = 0;
  function updateCamera() {
    var ce = Math.cos(camEl), se = Math.sin(camEl);
    camera.position.set(
      camDist * ce * Math.sin(camAz),
      camDist * se + 1.35,
      camDist * ce * Math.cos(camAz)
    );
    camera.lookAt(0, 1.4, 0);
  }
  updateCamera();
  renderer.domElement.style.touchAction = 'none';
  renderer.domElement.addEventListener('mousedown', function(e) {
    if (e.button === 0) { camDrag = true; camLX = e.clientX; camLY = e.clientY; }
  });
  window.addEventListener('mouseup', function() { camDrag = false; });
  window.addEventListener('mousemove', function(e) {
    if (!camDrag) return;
    camAz   -= (e.clientX - camLX) * 0.008;
    camEl   += (e.clientY - camLY) * 0.006;
    camEl    = Math.max(-1.2, Math.min(1.2, camEl));
    camLX = e.clientX; camLY = e.clientY;
    updateCamera();
  });
  renderer.domElement.addEventListener('wheel', function(e) {
    camDist = Math.max(3.5, Math.min(16, camDist + e.deltaY * 0.004));
    updateCamera();
    e.preventDefault();
  }, { passive: false });

  // ── Animation state ────────────────────────────────────────
  var clock        = new THREE.Clock();
  var time         = 0;
  var targetLanceY = LANCE_REST_Y;
  var targetGlow   = 0;
  var tiltCurrent  = 0;
  var tiltTarget   = 0;
  var prevProcState = '';
  var wasPouring    = false;

  function tempToColor(t) {
    var f = Math.max(0, Math.min(1, (t - 1300) / 420));
    return new THREE.Color(0.78 + 0.22 * f, 0.08 + 0.52 * f, 0);
  }

  function respawnSpark(idx) {
    var ny = lanceGroup.position.y - 2.30;
    var ang = Math.random() * Math.PI * 2;
    var r   = Math.random() * 0.075;
    spkPos[idx*3]   = Math.cos(ang) * r;
    spkPos[idx*3+1] = ny;
    spkPos[idx*3+2] = Math.sin(ang) * r;
    var sp = 0.22 + Math.random() * 0.38;
    spkVel[idx].set(
      (Math.random() - 0.5) * 0.85,
      -sp * (0.35 + Math.random() * 0.45),
      (Math.random() - 0.5) * 0.85
    );
    spkLife[idx] = 0.25 + Math.random() * 0.55;
  }

  function respawnSmoke(idx) {
    var tipY = lanceGroup.position.y - 2.30;
    smokePos[idx*3]   = (Math.random() - 0.5) * 0.55;
    smokePos[idx*3+1] = tipY + 0.05 + Math.random() * 0.12;
    smokePos[idx*3+2] = (Math.random() - 0.5) * 0.55;
    smokeVel[idx].set(
      (Math.random() - 0.5) * 0.04,
      0.35 + Math.random() * 0.45,
      (Math.random() - 0.5) * 0.04
    );
    smokeLife[idx] = 0.9 + Math.random() * 0.8;
  }

  // ── Scene-sync ─────────────────────────────────────────────
  syncScene = function() {
    var s = converterState;
    var isBlowing  = (s.state === 'blowing');
    var isComplete = (s.state === 'complete');

    var mH = bathHeightFromLevel(s.metalLevel, 0);
    var slH = Math.max(0, s.slagLevel) * MAX_SLAG_H + currentFoamSlH;
    if (layoutBathFill) layoutBathFill(mH, slH);

    // Temperature colour
    if (isBlowing || isComplete) {
      var col = tempToColor(s.temperature || 1500);
      metalMat.color = col;
      metalMat.emissive = col.clone().multiplyScalar(0.55);
      if (metalSurf.visible) {
        metalSurfMat.color = col.clone().multiplyScalar(1.35);
        metalSurfMat.emissive = col.clone().multiplyScalar(1.1);
      }
    }

    targetLanceY = lanceTargetY(mH, slH, isBlowing, s.lanceHeight || 0);

    // Glow
    targetGlow = mH * (isBlowing ? 3.0 : 0.9);

    // Fume hood / lance visibility
    var showHood = !isComplete && sceneMode === SCENE_HALL;
    hoodGroup.forEach(function(m) { m.visible = showHood; });

    tiltTarget = isComplete ? (130 * Math.PI / 180) : 0;
    if (!isComplete) ladleFillLevel = 0;
  };

  setSceneMode = function(mode) {
    sceneMode = mode;
    var isProduct = (mode === SCENE_PRODUCT);
    hallGroup.visible = !isProduct;
    frameGroup.visible = !isProduct;
    ladleGroup.visible = !isProduct;
    lamp1.visible = lamp2.visible = !isProduct;
    scene.background.setHex(isProduct ? productBg : hallBg);
    sun.intensity = isProduct ? 2.85 : 2.35;
    hemi.intensity = isProduct ? 0.95 : 0.78;
    if (isProduct) {
      scene.fog = null;
    } else {
      scene.fog = new THREE.Fog(hallBg, 26, 50);
    }
    var L = UI_LABELS[currentUiLanguage] || UI_LABELS.ru;
    document.getElementById('scene-toggle').textContent =
      isProduct ? L.sceneProduct : L.sceneHall;
    syncScene();
  };

  document.getElementById('scene-toggle').addEventListener('click', function() {
    setSceneMode(sceneMode === SCENE_HALL ? SCENE_PRODUCT : SCENE_HALL);
  });

  // ── Main render loop ────────────────────────────────────────
  function animate() {
    requestAnimationFrame(animate);
    var dt = clock.getDelta();
    time += dt;

    tiltCurrent += (tiltTarget - tiltCurrent) * 0.025;
    vesselGroup.rotation.x = tiltCurrent;
    vesselGroup.rotation.z = 0;

    var pourF = 0;
    if (converterState.state === 'complete' && tiltCurrent > 0.087) {
      pourF = Math.min(1, (tiltCurrent * 180 / Math.PI - 5) / 125);
    }
    currentFoamSlH += (targetFoamSlH - currentFoamSlH) * Math.min(1, dt * 5.5);
    var mH = bathHeightFromLevel(converterState.metalLevel, pourF);
    var slH = Math.max(0, converterState.slagLevel) * MAX_SLAG_H * (1 - pourF * 0.85)
      + currentFoamSlH * (1 - pourF * 0.5);
    if (layoutBathFill) layoutBathFill(mH, slH);

    var phiVal = converterState.phi || 0;
    var phiAlarm = !!converterState.phiAlarm;
    if (phiAlarm) {
      neckAlarmPhase += dt * 9.0;
      var blink = 0.45 + 0.55 * Math.sin(neckAlarmPhase);
      neckAlarmMat.emissiveIntensity = blink * 1.6;
      neckAlarmMat.opacity = 0.55 + 0.35 * blink;
      neckAlarmRing.visible = true;
    } else if (phiVal >= 0.5) {
      neckAlarmPhase += dt * 4.0;
      neckAlarmMat.emissiveIntensity = 0.35 + 0.2 * Math.sin(neckAlarmPhase);
      neckAlarmMat.emissive.setHex(0xffaa00);
      neckAlarmMat.opacity = 0.45;
      neckAlarmRing.visible = true;
    } else {
      neckAlarmMat.emissiveIntensity = 0;
      neckAlarmRing.visible = false;
    }

    lanceGroup.position.y += (targetLanceY - lanceGroup.position.y) * 0.04;

    // Lance guide ring follows the lance down into the vessel neck
    guideRing.position.y = Math.min(2.80, lanceGroup.position.y - 2.12);

    // Glow lerp
    glowLight.position.y = metalBody.visible ? bathTopY - 0.08 : 1.0;
    glowLight.intensity += (targetGlow - glowLight.intensity) * 0.06;
    if (metalBody.visible) glowLight.color = metalMat.color;

    var procState = converterState.state;
    var isBlowing = (procState === 'blowing');
    if (isBlowing && prevProcState !== 'blowing') {
      for (var si = 0; si < N_SPARK; si++) respawnSpark(si);
    }
    prevProcState = procState;

    blowJet.visible = isBlowing;
    if (isBlowing) {
      blowJet.material.opacity = 0.16 + 0.10 * Math.sin(time * 9);
      blowJet.scale.set(1, 1, 1);
    }

    // Lance light
    lanceLight.position.copy(lanceGroup.position);
    lanceLight.position.y -= 2.30;
    lanceLight.intensity = isBlowing ? 1.8 : 0;

    var penD = converterState.penetrationDepth || 0;
    var tipWorldY = lanceGroup.position.y - 2.30;
    if (isBlowing && penD > 0.02) {
      pitCone.visible = true;
      var pitH = Math.min(1.2, Math.max(0.08, penD));
      pitCone.scale.set(1, pitH / 0.55, 1);
      pitCone.position.y = -2.30 - pitH * 0.5;
    } else {
      pitCone.visible = false;
    }

    if (converterState.reactionZoneActive && isBlowing && penD > 0) {
      reactionLight.position.set(0, tipWorldY - penD * 0.35, 0);
      reactionLight.intensity += (2.4 - reactionLight.intensity) * 0.08;
    } else {
      reactionLight.intensity += (0 - reactionLight.intensity) * 0.12;
    }

    // Sparks from lance tip
    var showSpark = isBlowing && metalBody.visible;
    spkMat.opacity = showSpark ? 0.95 : 0;
    if (showSpark) {
      var pa = spkGeo.attributes.position.array;
      for (var i = 0; i < N_SPARK; i++) {
        spkLife[i] -= dt;
        if (spkLife[i] <= 0) {
          respawnSpark(i);
        } else {
          pa[i*3]   += spkVel[i].x * dt;
          pa[i*3+1] += spkVel[i].y * dt;
          pa[i*3+2] += spkVel[i].z * dt;
          spkVel[i].y -= 5.5 * dt;
        }
      }
      spkGeo.attributes.position.needsUpdate = true;
      metalMat.emissiveIntensity = 0.48 + 0.10 * Math.sin(time * 5);
      if (metalSurf.visible) {
        metalSurfMat.emissiveIntensity = 0.68 + 0.14 * Math.sin(time * 5);
      }
    } else {
      metalMat.emissiveIntensity = 0.50;
      if (metalSurf.visible) metalSurfMat.emissiveIntensity = 0.72;
    }

    var showSmoke = (procState === 'blowing' || procState === 'complete');
    smokeMat.opacity = showSmoke ? (isBlowing ? 0.50 : 0.28) : 0;
    if (showSmoke) {
      var sa = smokeGeo.attributes.position.array;
      var smokeSpawn = isBlowing ? 0.55 : 0.12;
      for (var j = 0; j < N_SMOKE; j++) {
        smokeLife[j] -= dt;
        if (smokeLife[j] <= 0) {
          if (Math.random() < smokeSpawn) respawnSmoke(j);
          else sa[j*3] = 999;
        } else {
          sa[j*3]   += smokeVel[j].x * dt;
          sa[j*3+1] += smokeVel[j].y * dt;
          sa[j*3+2] += smokeVel[j].z * dt;
          smokeVel[j].x += (Math.random() - 0.5) * 0.02 * dt;
          smokeVel[j].z += (Math.random() - 0.5) * 0.02 * dt;
        }
      }
      smokeGeo.attributes.position.needsUpdate = true;
    }

    var isPouring = (procState === 'complete' && tiltCurrent > 0.20);
    if (isPouring && !wasPouring) {
      for (var pi0 = 0; pi0 < N_POUR; pi0++) respawnPour(pi0);
    }
    wasPouring = isPouring;

    pourMat.opacity = isPouring ? 0.92 : 0;
    if (isPouring) {
      ladleFillLevel = Math.min(1, ladleFillLevel + dt * 0.35);
      ladleFill.visible = true;
      ladleFill.scale.y = 0.05 + ladleFillLevel * 0.95;
      var col = tempToColor(converterState.temperature || 1650);
      ladleFillMat.color.copy(col);
      ladleFillMat.emissive.copy(col).multiplyScalar(0.55);
      pourMat.color.copy(col);

      var pa = pourGeo.attributes.position.array;
      for (var k = 0; k < N_POUR; k++) {
        pourLife[k] -= dt;
        if (pourLife[k] <= 0) {
          respawnPour(k);
        } else {
          pa[k*3]   += pourVel[k].x * dt;
          pa[k*3+1] += pourVel[k].y * dt;
          pa[k*3+2] += pourVel[k].z * dt;
          pourVel[k].y -= 9.0 * dt;
          pourVel[k].x += (pourEnd.x - pa[k*3])   * dt * 1.4;
          pourVel[k].z += (pourEnd.z - pa[k*3+2]) * dt * 1.4;
          if (pa[k*3+1] < 0.1) pourLife[k] = 0;
        }
      }
      pourGeo.attributes.position.needsUpdate = true;
      if (metalBody.visible) {
        metalMat.emissiveIntensity = 0.55 + 0.12 * Math.sin(time * 6);
      }
    } else {
      ladleFillLevel = 0;
      ladleFill.visible = false;
    }

    renderer.render(scene, camera);
  }

  applyUiTheme('dark');

  animate();

}
</script>
</body>
